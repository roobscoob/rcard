[package]
name = "rcard-log-scraper"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rcard-log-scraper"

[dependencies]
object = { version = "0.36", default-features = false, features = ["read", "elf"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }

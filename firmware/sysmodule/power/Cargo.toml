[package]
name = "sysmodule_power"
version = "0.1.0"
edition = "2021"

[features]
default = ["bare-panics"]
bare-panics = ["ipc/bare-panics"]

[dependencies]
ipc = { path = "../../modules/ipc", features = ["executor"] }
embassy-time = { version = "0.5", default-features = false, features = ["tick-hz-1_000"] }
sysmodule_power_api = { path = "api", features = ["bare-panics"] }
sysmodule_log_api = { path = "../log/api" }
sysmodule_efuse_api = { path = "../efuse/api", features = ["bare-panics"] }
sysmodule_reactor_api = { path = "../reactor/api", features = ["bare-panics"] }
sifli-pac = { version = "0.2", features = ["sf32lb52x"] }
rcard-log = { path = "../../../shared/log", features = ["writer"] }
rcard-log-macros = { path = "../../../shared/log/macros" }
once-cell = { path = "../../modules/once_cell" }
userlib.workspace = true
generated = { path = "../../modules/generated" }

[[bin]]
name = "sysmodule_power"
test = false
bench = false

[lints]
workspace = true

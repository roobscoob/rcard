[package]
name = "sysmodule_lcpu"
version = "0.1.0"
edition = "2024"

[features]
default = []
bare-panics = ["ipc/bare-panics"]

[dependencies]
ipc = { path = "../../modules/ipc" }
sysmodule_log_api = { path = "../log/api" }
sysmodule_reactor_api = { path = "../reactor/api" }
sysmodule_device_api = { path = "../device/api", features = ["bare-panics"] }
sysmodule_efuse_api = { path = "../efuse/api" }
rcard-log = { path = "../../../shared/log" }
rcard-log-macros = { path = "../../../shared/log/macros" }
sysmodule_lcpu_api = { path = "api" }
# pin to github because the version on crates.io is missing some critical stuff
sifli-pac = { git = "https://github.com/OpenSiFli/sifli-pac.git", rev = "bc148a3", features = ["sf32lb52x"] }
userlib.workspace = true
generated = { path = "../../modules/generated" }
cortex-m = "0.7.7"

# RFC command sequencer + RivieraWaves register defs used by rf_cal/.
# Pulled from crates.io (the published version, no fork). sifli-rs's
# sifli-radio crate references the same version with the same features.
# Source: sifli-rs/sifli-radio/Cargo.toml:17 @ commit aa4c19c.
rwbt = { version = "0.1.1", features = ["sifli", "prebuild"] }

[[bin]]
name = "sysmodule_lcpu"
test = false
bench = false

[lints]
workspace = true

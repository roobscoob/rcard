[package]
name = "sysmodule_lcpu"
version = "0.1.0"
edition = "2024"

[features]
default = []
bare-panics = ["ipc/bare-panics"]

[dependencies]
ipc = { path = "../../modules/ipc" }
sysmodule_lcpu_api = { path = "api", features = ["bare-panics"] }
sifli-pac = { version = "0.2", features = ["sf32lb52x"] }
userlib.workspace = true
generated = { path = "../../modules/generated" }

[[bin]]
name = "sysmodule_lcpu"
test = false
bench = false

[lints]
workspace = true

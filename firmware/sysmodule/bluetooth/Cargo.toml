[package]
name = "sysmodule_bluetooth"
version = "0.1.0"
edition = "2024"

[features]
default = []
bare-panics = ["ipc/bare-panics"]

[dependencies]
ipc = { path = "../../modules/ipc", features = ["executor"] }
sysmodule_bluetooth_api = { path = "api" }
sysmodule_lcpu_api = { path = "../lcpu/api" }
sysmodule_log_api = { path = "../log/api" }
sysmodule_reactor_api = { path = "../reactor/api" }
rcard-log = { path = "../../../shared/log" }
rcard-log-macros = { path = "../../../shared/log/macros" }
once-cell = { path = "../../modules/once_cell" }
userlib.workspace = true
generated = { path = "../../modules/generated" }
trouble-host = { version = "0.5", default-features = false, features = ["peripheral", "gatt", "default-packet-pool"] }
bt-hci = "0.6"
embassy-sync = { version = "0.7", default-features = false }
embassy-time = { version = "0.5", default-features = false, features = ["tick-hz-1_000"] }
embassy-futures = { version = "0.1", default-features = false }
embedded-io = "0.6"
static_cell = "2"

[[bin]]
name = "sysmodule_bluetooth"
test = false
bench = false

[lints]
workspace = true

[package]
name = "sysmodule_mpi"
version = "0.1.0"
edition = "2021"

[features]
bare-panics = []

[dependencies]
hubris-task-slots.workspace = true
idyll_runtime.workspace = true
ipc = { path = "../../modules/ipc" }
sifli-pac = { version = "0.2", features = ["sf32lb52x"] }
rcard-log = { path = "../../../shared/log", features = ["writer"] }
rcard-log-macros = { path = "../../../shared/log/macros" }
sysmodule_log_api = { path = "../../sysmodule/log/api" }
sysmodule_mpi_api = { path = "api" }
userlib = { workspace = true, features = ["no-panic-handler"] }

[[bin]]
name = "sysmodule_mpi"
test = false
bench = false

[lints]
workspace = true

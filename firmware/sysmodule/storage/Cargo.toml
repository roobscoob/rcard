[package]
name = "sysmodule_storage"
version = "0.1.0"
edition = "2021"

[features]
bare-panics = []
panics-emit-stack-dump = ["rcard-log/panics-emit-stack-dump"]

[dependencies]
generated = { path = "../../modules/generated" }
ipc = { path = "../../modules/ipc" }
rcard-log = { path = "../../../shared/log", features = ["writer"] }
rcard-log-macros = { path = "../../../shared/log/macros" }
sysmodule_log_api = { path = "../../sysmodule/log/api" }
sysmodule_mpi_api = { path = "../mpi/api" }
sysmodule_storage_api = { path = "api" }
once-cell = { path = "../../modules/once_cell" }
storage_api = { path = "../../modules/storage_api" }
userlib.workspace = true

[build-dependencies]
serde_json = "1"

[[bin]]
name = "sysmodule_storage"
test = false
bench = false

[lints]
workspace = true

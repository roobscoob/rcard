[package]
name = "sysmodule_fs"
version = "0.1.0"
edition = "2021"

[features]
bare-panics = []
panics-emit-stack-dump = ["rcard-log/panics-emit-stack-dump"]

[dependencies]
hubris-task-slots.workspace = true
idyll_runtime.workspace = true
ipc = { path = "../../modules/ipc" }
littlefs2-sys = "0.3"
once-cell = { path = "../../modules/once_cell" }
sysmodule_fs_api = { path = "api" }
rcard-log = { path = "../../../shared/log", features = ["writer"] }
rcard-log-macros = { path = "../../../shared/log/macros" }
sysmodule_log_api = { path = "../../sysmodule/log/api" }
sysmodule_storage_api = { path = "../storage/api" }
storage_api = { path = "../../modules/storage_api" }
userlib = { workspace = true, features = ["no-panic-handler"] }

[build-dependencies]
serde_json = "1"

[[bin]]
name = "sysmodule_fs"
test = false
bench = false

[lints]
workspace = true

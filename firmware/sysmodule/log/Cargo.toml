[package]
name = "sysmodule_log"
version = "0.1.0"
edition = "2021"

[features]
default = ["bare-panics"]
bare-panics = []

[dependencies]
idyll_runtime.workspace = true
ipc = { path = "../../modules/ipc" }
hubris-task-slots.workspace = true
rcard-log = { path = "../../../shared/log" }
sysmodule_log_api = { path = "api", features = ["bare-panics"] }
sysmodule_usart_api = { path = "../usart/api", features = ["bare-panics"] }
sysmodule_reactor_api = { path = "../reactor/api", features = ["bare-panics"] }
once-cell = { path = "../../modules/once_cell" }
userlib.workspace = true
zerocopy = "0.8"

[build-dependencies]
serde_json = "1"

[[bin]]
name = "sysmodule_log"
test = false
bench = false

[lints]
workspace = true

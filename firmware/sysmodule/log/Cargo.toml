[package]
name = "sysmodule_log"
version = "0.1.0"
edition = "2021"

[features]
default = ["bare-panics"]
bare-panics = []
panics-emit-stack-dump = ["rcard-log/panics-emit-stack-dump"]

[dependencies]
cobs = { version = "0.3", default-features = false }
ipc = { path = "../../modules/ipc" }
rcard-log = { path = "../../../shared/log", features = ["writer"] }
rcard-usb-proto = { path = "../../../shared/usb-proto" }
sysmodule_host_transport_api = { path = "../host_transport/api", features = ["bare-panics"] }
sysmodule_log_api = { path = "api", features = ["bare-panics"] }
sysmodule_usart_api = { path = "../usart/api", features = ["bare-panics"] }
sysmodule_reactor_api = { path = "../reactor/api", features = ["bare-panics"] }
sysmodule_efuse_api = { path = "../efuse/api", features = ["bare-panics"] }
once-cell = { path = "../../modules/once_cell" }
userlib.workspace = true
zerocopy = "0.8"
generated = { path = "../../modules/generated" }

[[bin]]
name = "sysmodule_log"
test = false
bench = false

[lints]
workspace = true

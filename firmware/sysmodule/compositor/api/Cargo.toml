[package]
name = "sysmodule_compositor_api"
version = "0.1.0"
edition = "2021"

[features]
bare-panics = []
host = ["ipc/host"]

[dependencies]
ipc = { path = "../../../modules/ipc" }
rcard_log.workspace = true
zerocopy = { version = "0.8", features = ["derive"] }

[target.'cfg(target_os = "none")'.dependencies]
userlib.workspace = true

[lib]
test = false
bench = false

[lints]
workspace = true

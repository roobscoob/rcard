[package]
name = "sysmodule_compositor"
version = "0.1.0"
edition = "2021"

[features]
bare-panics = []

[dependencies]
hubris-task-slots.workspace = true
idyll_runtime.workspace = true
ipc = { path = "../../modules/ipc" }
ipc-macros = { path = "../../modules/ipc/macros" }
sysmodule_compositor_api = { path = "api" }
sysmodule_display_api = { path = "../display/api" }
rcard-log = { path = "../../../shared/log", features = ["writer"] }
rcard-log-macros = { path = "../../../shared/log/macros" }
sysmodule_log_api = { path = "../log/api" }
userlib.workspace = true

[[bin]]
name = "sysmodule_compositor"
test = false
bench = false

[lints]
workspace = true

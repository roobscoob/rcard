[package]
name = "sysmodule_device_api"
version = "0.1.0"
edition = "2021"

[features]
bare-panics = ["ipc/bare-panics"]
host = ["ipc/host"]

[dependencies]
ipc = { path = "../../../modules/ipc" }
rcard-log-macros = { path = "../../../../shared/log/macros" }

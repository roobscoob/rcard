[package]
name = "sysmodule_reactor"
version = "0.1.0"
edition = "2021"

[features]
default = ["bare-panics"]
bare-panics = ["ipc/bare-panics"]

[dependencies]
ipc = { path = "../../modules/ipc" }
heapless = "0.8"
sysmodule_reactor_api = { path = "api", features = ["bare-panics"] }
userlib.workspace = true
generated = { path = "../../modules/generated" }

[[bin]]
name = "sysmodule_reactor"
test = false
bench = false

[lints]
workspace = true

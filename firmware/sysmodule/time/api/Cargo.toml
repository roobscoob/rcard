[package]
name = "sysmodule_time_api"
version = "0.1.0"
edition = "2021"

[features]
bare-panics = []
host = ["ipc/host"]

[dependencies]
ipc = { path = "../../../modules/ipc" }
zerocopy = "0.8"
serde = { version = "1", default-features = false, features = ["derive"] }
postcard-schema = { version = "0.2", default-features = false, features = ["derive"] }

[target.'cfg(target_os = "none")'.dependencies]
userlib.workspace = true

[lib]
test = false
bench = false

[lints]
workspace = true

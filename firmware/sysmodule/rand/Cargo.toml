[package]
name = "sysmodule_rand"
version = "0.1.0"
edition = "2021"

[features]
default = ["bare-panics"]
bare-panics = ["ipc/bare-panics"]

[dependencies]
ipc = { path = "../../modules/ipc" }
sysmodule_rand_api = { path = "api", features = ["bare-panics"] }
sysmodule_clocks_api = { path = "../clocks/api", features = ["bare-panics"] }
userlib.workspace = true
generated = { path = "../../modules/generated" }

[[bin]]
name = "sysmodule_rand"
test = false
bench = false

[lints]
workspace = true

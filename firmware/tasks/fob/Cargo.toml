[package]
name = "fob"
version = "0.1.0"
edition = "2021"

[features]
bare-panics = []
panics-emit-stack-dump = ["rcard-log/panics-emit-stack-dump"]

[dependencies]
generated = { path = "../../modules/generated" }
ipc = { path = "../../modules/ipc" }
once-cell = { path = "../../modules/once_cell" }
rcard-log = { path = "../../../shared/log", features = ["writer"] }
rcard-log-macros = { path = "../../../shared/log/macros" }
sysmodule_mpr121_api = { path = "../../sysmodule/mpr121/api" }
sysmodule_compositor_api = { path = "../../sysmodule/compositor/api" }
sysmodule_drv2603_api = { path = "../../sysmodule/drv2603/api" }
sysmodule_lcpu_api = { path = "../../sysmodule/lcpu/api" }
sysmodule_log_api = { path = "../../sysmodule/log/api" }
sysmodule_power_api = { path = "../../sysmodule/power/api", features = ["bare-panics"] }
sysmodule_reactor_api = { path = "../../sysmodule/reactor/api" }
userlib.workspace = true

[[bin]]
name = "fob"
test = false
bench = false

[lints]
workspace = true
